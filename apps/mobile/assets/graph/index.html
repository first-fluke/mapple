<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;font-family:-apple-system,system-ui,sans-serif}
canvas{display:block}
body[data-theme="dark"]{background:#09090b}
body[data-theme="light"]{background:#ffffff}
</style>
</head>
<body data-theme="dark">
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');

var nodes=[];
var edges=[];
var nodeMap={};
var theme='dark';
var highlightedId=null;
var width=0,height=0,dpr=1;
var settled=false,tickCount=0;

// Group colors (zinc-aware palette)
var GROUP_COLORS=['#3b82f6','#8b5cf6','#22c55e','#f97316','#ec4899','#06b6d4','#eab308','#ef4444','#14b8a6','#6366f1'];
var groupMap={},groupIdx=0;

function groupColor(g){
  if(!g)return theme==='dark'?'#71717a':'#a1a1aa';
  if(!groupMap[g]){groupMap[g]=GROUP_COLORS[groupIdx%GROUP_COLORS.length];groupIdx++;}
  return groupMap[g];
}

function themeColors(){
  return theme==='dark'?{
    edge:'rgba(63,63,70,0.5)',
    text:'#fafafa',
    mutedText:'#a1a1aa',
    highlight:'#f4f4f5',
    glow:'rgba(244,244,245,0.25)',
    initial:'#fafafa'
  }:{
    edge:'rgba(212,212,216,0.7)',
    text:'#18181b',
    mutedText:'#71717a',
    highlight:'#18181b',
    glow:'rgba(24,24,27,0.15)',
    initial:'#ffffff'
  };
}

// Simulation constants
var REP=800,ATT=0.012,GRAV=0.02,DAMP=0.88,MIN_V=0.01,MAX_TICK=300,R=22;

function resize(){
  dpr=window.devicePixelRatio||1;
  width=window.innerWidth;height=window.innerHeight;
  canvas.width=width*dpr;canvas.height=height*dpr;
  canvas.style.width=width+'px';canvas.style.height=height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  settled=false;tickCount=0;
}

function initPositions(){
  var cx=width/2,cy=height/2,rad=Math.min(width,height)*0.3;
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(n.x===undefined){
      var a=2*Math.PI*i/nodes.length;
      n.x=cx+rad*Math.cos(a)+(Math.random()-0.5)*20;
      n.y=cy+rad*Math.sin(a)+(Math.random()-0.5)*20;
    }
    n.vx=0;n.vy=0;
  }
  settled=false;tickCount=0;
}

function tick(){
  if(settled||nodes.length===0)return;
  var cx=width/2,cy=height/2;
  var i,j,a,b,dx,dy,dist,f,fx,fy;

  for(i=0;i<nodes.length;i++){nodes[i].fx=0;nodes[i].fy=0;}

  // Repulsion
  for(i=0;i<nodes.length;i++){
    for(j=i+1;j<nodes.length;j++){
      a=nodes[i];b=nodes[j];
      dx=a.x-b.x;dy=a.y-b.y;
      dist=Math.sqrt(dx*dx+dy*dy)||1;
      f=REP/(dist*dist);
      fx=dx/dist*f;fy=dy/dist*f;
      a.fx+=fx;a.fy+=fy;b.fx-=fx;b.fy-=fy;
    }
  }

  // Attraction along edges
  for(i=0;i<edges.length;i++){
    var e=edges[i];
    a=nodeMap[e.source];b=nodeMap[e.target];
    if(!a||!b)continue;
    dx=b.x-a.x;dy=b.y-a.y;
    dist=Math.sqrt(dx*dx+dy*dy)||1;
    f=dist*ATT;
    fx=dx/dist*f;fy=dy/dist*f;
    a.fx+=fx;a.fy+=fy;b.fx-=fx;b.fy-=fy;
  }

  // Center gravity
  var totalV=0;
  for(i=0;i<nodes.length;i++){
    var n=nodes[i];
    n.fx+=(cx-n.x)*GRAV;n.fy+=(cy-n.y)*GRAV;
    n.vx=(n.vx+n.fx)*DAMP;n.vy=(n.vy+n.fy)*DAMP;
    n.x+=n.vx;n.y+=n.vy;
    totalV+=Math.abs(n.vx)+Math.abs(n.vy);
  }

  tickCount++;
  if(totalV/nodes.length<MIN_V||tickCount>MAX_TICK)settled=true;
}

function render(){
  var c=themeColors();
  ctx.clearRect(0,0,width,height);

  // Edges
  ctx.strokeStyle=c.edge;ctx.lineWidth=1.5;
  for(var i=0;i<edges.length;i++){
    var e=edges[i],s=nodeMap[e.source],t=nodeMap[e.target];
    if(!s||!t)continue;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);ctx.stroke();
  }

  // Nodes
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    var hi=n.id===highlightedId;
    var col=groupColor(n.group);

    // Glow
    if(hi){
      ctx.beginPath();ctx.arc(n.x,n.y,R+6,0,Math.PI*2);
      ctx.fillStyle=c.glow;ctx.fill();
    }

    // Circle
    ctx.beginPath();ctx.arc(n.x,n.y,R,0,Math.PI*2);
    ctx.fillStyle=col;ctx.fill();
    if(hi){ctx.strokeStyle=c.highlight;ctx.lineWidth=2.5;ctx.stroke();}

    // Initial inside circle
    ctx.fillStyle=c.initial;
    ctx.font='bold 13px -apple-system,system-ui,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n.name.charAt(0).toUpperCase(),n.x,n.y);

    // Name below
    ctx.fillStyle=c.text;
    ctx.font='11px -apple-system,system-ui,sans-serif';
    ctx.textBaseline='top';
    var label=n.name.length>12?n.name.substring(0,11)+'\u2026':n.name;
    ctx.fillText(label,n.x,n.y+R+5);
  }
}

function loop(){tick();render();requestAnimationFrame(loop);}

// Hit test
function nodeAt(x,y){
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i],dx=x-n.x,dy=y-n.y;
    if(dx*dx+dy*dy<=(R+8)*(R+8))return n;
  }
  return null;
}

// Touch / click
var tapStart=null;

function onDown(x,y){tapStart={x:x,y:y,t:Date.now()};}

function onUp(x,y){
  if(!tapStart)return;
  var dx=x-tapStart.x,dy=y-tapStart.y,dt=Date.now()-tapStart.t;
  tapStart=null;
  if(dt<300&&dx*dx+dy*dy<400){
    var n=nodeAt(x,y);
    if(n){
      sendMessage({type:'NODE_TAPPED',payload:{nodeId:n.id,name:n.name,group:n.group||null,avatarUrl:n.avatarUrl||null}});
    }
  }
}

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();var t=e.touches[0],r=canvas.getBoundingClientRect();
  onDown(t.clientX-r.left,t.clientY-r.top);
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();var t=e.changedTouches[0],r=canvas.getBoundingClientRect();
  onUp(t.clientX-r.left,t.clientY-r.top);
},{passive:false});

canvas.addEventListener('mousedown',function(e){onDown(e.offsetX,e.offsetY);});
canvas.addEventListener('mouseup',function(e){onUp(e.offsetX,e.offsetY);});

// Bridge
function sendMessage(msg){
  try{
    if(window.flutter_inappwebview){
      window.flutter_inappwebview.callHandler('onGraphMessage',JSON.stringify(msg));
    }else if(window.parent!==window){
      window.parent.postMessage(msg,'*');
    }
  }catch(e){/* ignore */}
}

window.graphBridge={
  receive:function(msg){
    if(typeof msg==='string')msg=JSON.parse(msg);
    switch(msg.type){
      case 'SET_NODES':
        nodes=msg.payload.nodes.map(function(n){return{id:n.id,name:n.name,avatarUrl:n.avatarUrl,group:n.group,x:undefined,y:undefined,vx:0,vy:0,fx:0,fy:0};});
        nodeMap={};for(var i=0;i<nodes.length;i++)nodeMap[nodes[i].id]=nodes[i];
        initPositions();
        break;
      case 'SET_EDGES':
        edges=msg.payload.edges;
        settled=false;tickCount=0;
        break;
      case 'SET_THEME':
        theme=msg.payload.theme;
        document.body.setAttribute('data-theme',theme);
        break;
      case 'HIGHLIGHT_NODE':
        highlightedId=msg.payload.nodeId;
        break;
    }
  }
};

// Init
resize();
window.addEventListener('resize',resize);
loop();
sendMessage({type:'READY',payload:{version:'1.0.0'}});

})();
</script>
</body>
</html>
