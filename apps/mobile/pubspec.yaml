name: mobile
description: Globe CRM mobile application.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  go_router: ^15.0.0
  forui: ^0.21.3
  dio: ^5.0.0
  drift: ^2.0.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.0.0
  path: ^1.9.0
  flutter_inappwebview: ^6.0.0
  connectivity_plus: ^6.0.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.0
  build_runner: ^2.4.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0
  drift_dev: ^2.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/graph/
    - assets/globe/
