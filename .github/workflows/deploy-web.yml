name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web

      - name: Build
        run: bun run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # NOTE: Cloudflare Workers deploy is scaffolded (wrangler.jsonc,
      # open-next.config.ts, cf:* scripts) but blocked until @opennextjs/cloudflare
      # supports Next 16 Node-runtime proxy.ts — see opennextjs-cloudflare#962.
      # Switch this step to `bun run cf:deploy` once that lands.
      - name: Deploy to Vercel
        run: |
          bunx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          bunx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
