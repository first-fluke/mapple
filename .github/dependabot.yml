version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - infrastructure

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - infrastructure
